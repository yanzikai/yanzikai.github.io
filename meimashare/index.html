	<style>
		*{

			margin: 0; 
		}
		html,body{

		}
		a{
			-webkit-appearance: none;
			-moz-appearance: none;

			text-decoration: none;

		body{

		    overscroll-behavior-x: none;
		    position: relative;
		    font-size: 0.24rem;
		    background: #f6f6f6;
		}
		.fix{
			display: none;
			position: fixed;
			width: 100%;

			top: 0;
			left: 0;
			background: rgba(0,0,0,.5);
		}
		.fix img{

		}

		}
		.upload{
			height: 1.4rem;

			background: url('./a.png') center no-repeat;
			background-size: contain;
			
		}
		.abox{

		.abox a{
			width: 6.3rem;
			height: 100%;display: inline-block;line-height: 60px;text-align: center;font-style: normal;text-decoration: none; color: #f49503;
		}
		.text{
			width: 5.9rem;
			display: inline-block;
		}
		.textbox{

		}
		.white{
			background: #fff;

		.btmtext p{
			text-align: center;
			font-size: 0.34rem;
			line-height: 0.74rem;
			padding-top: 0.3rem;

		}
		.btmtext div{
			padding: 0 0.4rem;
			font-size: 0.28rem;
			line-height: 0.46rem;
			color: #3c3c3c;

</head>

	<script>
		function is_weixn(){  
		    var ua = navigator.userAgent.toLowerCase();  
		    if(ua.match(/MicroMessenger/i)=="micromessenger") {  
		    	$('.fix').show();
		        return true;  
		    } else {  
		        return false;  
		    }  
		}
		$(function () {
		    var u = navigator.userAgent, app = navigator.appVersion;
		    var isAndroid = u.indexOf('Android') > -1 || u.indexOf('Linux') > -1; //g
		    var isIOS = !!u.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/); //ios终端
		    if (isAndroid) {
		        $('.upload').attr('href','http://www.yyrjw.com/app/xxt1130.apk')
		        $('.upload').on('click',function(){
					is_weixn()
				}) 
		    }
		    if (isIOS) {
		        $('.upload').attr('href','https://itunes.apple.com/cn/app/%E9%9E%8B%E8%AE%AF%E9%80%9A/id1319178119?mt=8')
		    }
		});
